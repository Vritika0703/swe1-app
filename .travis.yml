language: python
python:
  - "3.11"
cache: pip
install:
  - pip install -r requirements.txt
  - pip install black flake8 coverage coveralls
before_script:
  - python manage.py migrate
script:
  - black .
  - flake8 .
  - coverage run --source=mysite,polls manage.py test
after_success:
  - coveralls
